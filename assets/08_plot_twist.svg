<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes systemCrash { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes revealText { 0%, 50% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes redGlowPulse { 0%, 100% { filter: drop-shadow(0 0 10px #FF2A2A); } 50% { filter: drop-shadow(0 0 30px #FF2A2A); } }
      
      .bg { fill: #050505; }
      .text-crash { font-family: 'Share Tech Mono', monospace; fill: #FF2A2A; font-size: 24px; font-weight: bold; animation: systemCrash 0.2s 10; }
      .text-reveal { font-family: 'Share Tech Mono', monospace; fill: #FF2A2A; font-size: 18px; animation: revealText 8s forwards; opacity: 0; }
      .text-final { font-family: 'Share Tech Mono', monospace; fill: #fff; font-size: 28px; font-weight: bold; animation: revealText 10s forwards; opacity: 0; }
      .text-success { font-family: 'Share Tech Mono', monospace; fill: #00FF66; font-size: 14px; animation: revealText 12s forwards; opacity: 0; }
      
      .red-glow { animation: redGlowPulse 4s infinite; }
    </style>
  </defs>

  <rect class="bg" width="800" height="600" />
  
  <g transform="translate(100, 100)">
    <text x="0" y="0" class="text-crash">FATAL ERROR: SENSOR OVERRIDE</text>
    <text x="0" y="30" class="text-crash">█████████████████████████</text>
    <text x="0" y="60" class="text-crash">██ ██ ███ ██ ████ ██ ██ ██</text>

    <text x="0" y="200" class="text-reveal" style="animation-duration: 4s;">> You believed you were observing Danny.</text>
    <text x="0" y="240" class="text-reveal" style="animation-duration: 5s;">> Running diagnostic...</text>
    <text x="0" y="280" class="text-reveal" style="animation-duration: 6s;">> Diagnostic failed.</text>
    <text x="0" y="320" class="text-reveal" style="animation-duration: 7s;">> Truth extracted.</text>
    
    <text x="300" y="420" class="text-final red-glow" text-anchor="middle">DANNY HAS BEEN OBSERVING YOU.</text>
    
    <text x="300" y="480" class="text-success" text-anchor="middle">[ CONNECTION ESTABLISHED ]</text>
  </g>
</svg>
