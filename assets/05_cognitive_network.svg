<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes pulseNode { 0%, 100% { filter: drop-shadow(0 0 5px #00E5FF); } 50% { filter: drop-shadow(0 0 20px #00E5FF); } }
      @keyframes pulseLink { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
      @keyframes floatSlow { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(0, -10px); } }
      
      .bg { fill: #050505; }
      .text-title { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
      .text-label { font-family: 'Share Tech Mono', monospace; fill: #fff; font-size: 14px; text-anchor: middle; pointer-events: none; }
      
      .link { stroke: rgba(0, 229, 255, 0.2); stroke-width: 2; }
      .link-active { stroke: #00E5FF; stroke-width: 2; stroke-dasharray: 10 10; animation: pulseLink 2s linear infinite; }
      
      .node { fill: #050505; stroke: #00E5FF; stroke-width: 2; cursor: crosshair; }
      .node-core { fill: rgba(0, 229, 255, 0.2); animation: pulseNode 3s infinite; }
      .glow { filter: drop-shadow(0 0 8px #00E5FF); }
    </style>
  </defs>

  <rect class="bg" width="800" height="600" />
  
  <text x="400" y="80" class="text-title glow" text-anchor="middle">[ COGNITIVE NETWORK ARCHITECTURE ]</text>

  <g transform="translate(0, 50)" style="animation: floatSlow 6s ease-in-out infinite;">
    <line x1="400" y1="100" x2="250" y2="200" class="link-active" />
    <line x1="400" y1="100" x2="400" y2="250" class="link" />
    <line x1="400" y1="100" x2="550" y2="200" class="link-active" style="animation-direction: reverse;" />
    
    <line x1="250" y1="200" x2="400" y2="250" class="link" />
    <line x1="550" y1="200" x2="400" y2="250" class="link" />
    
    <line x1="250" y1="200" x2="200" y2="350" class="link-active" />
    <line x1="550" y1="200" x2="600" y2="350" class="link-active" style="animation-direction: reverse;" />
    
    <line x1="400" y1="250" x2="400" y2="400" class="link-active" />
    <line x1="200" y1="350" x2="400" y2="400" class="link" />
    <line x1="600" y1="350" x2="400" y2="400" class="link" />

    <circle cx="400" cy="100" r="45" class="node node-core" />
    <text x="400" y="105" class="text-label" style="font-size: 16px; font-weight: bold;">AI</text>
    
    <circle cx="250" cy="200" r="40" class="node node-core" style="animation-delay: 0.5s;" />
    <text x="250" y="200" class="text-label">Computer</text>
    <text x="250" y="215" class="text-label">Vision</text>

    <circle cx="400" cy="250" r="50" class="node node-core" style="animation-delay: 1s;" />
    <text x="400" y="255" class="text-label" style="fill: #00FF66;">Research</text>

    <circle cx="550" cy="200" r="35" class="node node-core" style="animation-delay: 1.5s;" />
    <text x="550" y="205" class="text-label">IoT</text>

    <circle cx="200" cy="350" r="45" class="node node-core" style="animation-delay: 2s;" />
    <text x="200" y="345" class="text-label">Software</text>
    <text x="200" y="360" class="text-label">Engineering</text>

    <circle cx="600" cy="350" r="40" class="node node-core" style="animation-delay: 2.5s;" />
    <text x="600" y="345" class="text-label">Full</text>
    <text x="600" y="360" class="text-label">Stack</text>

    <circle cx="400" cy="400" r="45" class="node node-core" style="animation-delay: 3s;" />
    <text x="400" y="395" class="text-label">Youth</text>
    <text x="400" y="410" class="text-label">Innovation</text>
  </g>
</svg>
