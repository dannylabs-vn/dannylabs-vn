<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes shatter { 0%, 100% { transform: translate(0, 0); } 5% { transform: translate(-2px, 2px); } 10% { transform: translate(2px, -2px); } 15% { transform: translate(0, 0); } }
      @keyframes fractureGlow { 0%, 100% { filter: drop-shadow(0 0 2px #00E5FF); } 50% { filter: drop-shadow(0 0 10px #FF2A2A); } }
      
      .bg { fill: #050505; }
      .text-title { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
      .text-year { font-family: 'Share Tech Mono', monospace; fill: #FF2A2A; font-size: 18px; font-weight: bold; }
      .text-event { font-family: 'Share Tech Mono', monospace; fill: #fff; font-size: 14px; }
      
      .fracture-line { stroke: #00E5FF; stroke-width: 2; fill: none; animation: fractureGlow 4s infinite; }
      .glitch { animation: shatter 5s infinite; }
    </style>
  </defs>

  <rect class="bg" width="800" height="600" />
  
  <text x="50" y="80" class="text-title" style="filter: drop-shadow(0 0 5px #FF2A2A);">[ TEMPORAL FRACTURES DETECTED ]</text>
  <text x="50" y="110" class="text-event" style="fill: #888;">Reconstructing timeline anomalies...</text>

  <g transform="translate(100, 150)" class="glitch">
    <path d="M 0 0 L 100 50 L 50 150 L 180 200 L 120 300 L 250 400 L 400 350 L 550 420 L 650 380" class="fracture-line" />
    
    <path d="M 100 50 L 150 20 L 200 40" class="fracture-line" style="opacity: 0.3;" />
    <path d="M 180 200 L 250 180" class="fracture-line" style="opacity: 0.3;" />
    <path d="M 400 350 L 450 250" class="fracture-line" style="opacity: 0.3;" />
    <path d="M 550 420 L 600 500" class="fracture-line" style="opacity: 0.3;" />

    <circle cx="0" cy="0" r="6" fill="#FF2A2A" />
    <text x="0" y="-15" class="text-year">2023</text>
    <text x="0" y="-35" class="text-event" style="fill: #FF2A2A;">REALITY SPLIT.</text>
    
    <circle cx="100" cy="50" r="4" fill="#00E5FF" />
    <text x="115" y="55" class="text-event">First Hackathon</text>
    
    <circle cx="50" cy="150" r="4" fill="#00E5FF" />
    <text x="65" y="155" class="text-event">IoT</text>
    
    <circle cx="180" cy="200" r="4" fill="#00E5FF" />
    <text x="195" y="205" class="text-event">Artificial Intelligence</text>
    
    <circle cx="250" cy="400" r="6" fill="#00FF66" />
    <text x="230" y="425" class="text-event" style="fill: #00FF66;">Research</text>
    
    <circle cx="650" cy="380" r="8" fill="none" stroke="#FF2A2A" stroke-width="2" stroke-dasharray="4 4" />
    <text x="650" y="360" class="text-year" text-anchor="middle">?</text>
    <text x="650" y="410" class="text-event" style="fill: #888;" text-anchor="middle">FUTURE UNKNOWN...</text>
  </g>
</svg>
