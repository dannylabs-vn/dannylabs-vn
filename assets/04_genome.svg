<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes spin { 0% { transform: scaleX(1); } 50% { transform: scaleX(-1); } 100% { transform: scaleX(1); } }
      @keyframes spinOffset { 0% { transform: scaleX(-1); } 50% { transform: scaleX(1); } 100% { transform: scaleX(-1); } }
      @keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 5px rgba(0,229,255,0.8)); } 50% { filter: drop-shadow(0 0 15px rgba(0,229,255,1)); } }
      
      .bg { fill: #050505; }
      .text-main { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; }
      .text-title { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
      .text-label { font-family: 'Share Tech Mono', monospace; fill: #fff; font-size: 14px; }
      .text-desc { font-family: 'Share Tech Mono', monospace; fill: #666; font-size: 10px; }
      .node-core { fill: #00E5FF; animation: glowPulse 2s infinite; }
      .node-mut { fill: #00FF66; animation: glowPulse 2s infinite; }
      .node-link { stroke: rgba(0,229,255,0.4); stroke-width: 2; }
      
      .dna-strand1 { animation: spin 4s linear infinite; transform-origin: center; }
      .dna-strand2 { animation: spinOffset 4s linear infinite; transform-origin: center; }
    </style>
  </defs>

  <rect class="bg" width="800" height="600" />
  
  <text x="50" y="80" class="text-title" style="filter: drop-shadow(0 0 5px #00E5FF);">SUBJECT GENOME SEQUENCE</text>
  <text x="50" y="110" class="text-main" style="font-size: 12px;">EXTRACTING COGNITIVE TRAITS...</text>

  <g transform="translate(400, 50)">
    
    <g transform="translate(0, 50)">
      <line x1="-150" y1="0" x2="150" y2="0" class="node-link" />
      <g class="dna-strand1">
        <circle cx="-150" cy="0" r="8" class="node-core" />
        <text x="-170" y="5" class="text-label" text-anchor="end">Artificial Intelligence</text>
        <text x="-170" y="20" class="text-desc" text-anchor="end">GENE: PRIMARY</text>
      </g>
      <g class="dna-strand2">
        <circle cx="150" cy="0" r="8" class="node-core" />
      </g>
    </g>

    <g transform="translate(0, 120)">
      <line x1="-100" y1="0" x2="100" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -0.5s;">
        <circle cx="-100" cy="0" r="8" class="node-core" />
        <text x="-120" y="5" class="text-label" text-anchor="end">Computer Vision</text>
        <text x="-120" y="20" class="text-desc" text-anchor="end">TRAIT: EVOLVED</text>
      </g>
      <g class="dna-strand2" style="animation-delay: -0.5s;">
        <circle cx="100" cy="0" r="8" class="node-core" />
      </g>
    </g>

    <g transform="translate(0, 190)">
      <line x1="-50" y1="0" x2="50" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -1s;">
        <circle cx="-50" cy="0" r="8" class="node-core" />
      </g>
      <g class="dna-strand2" style="animation-delay: -1s;">
        <circle cx="50" cy="0" r="8" class="node-core" />
        <text x="70" y="5" class="text-label" text-anchor="start">Machine Learning</text>
        <text x="70" y="20" class="text-desc" text-anchor="start">CHROMOSOME: CORE</text>
      </g>
    </g>

    <g transform="translate(0, 260)">
      <line x1="-100" y1="0" x2="100" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -1.5s;">
        <circle cx="-100" cy="0" r="8" class="node-core" />
      </g>
      <g class="dna-strand2" style="animation-delay: -1.5s;">
        <circle cx="100" cy="0" r="8" class="node-core" />
        <text x="120" y="5" class="text-label" text-anchor="start">Software Engineering</text>
        <text x="120" y="20" class="text-desc" text-anchor="start">CHROMOSOME: STRUCTURAL</text>
      </g>
    </g>

    <g transform="translate(0, 330)">
      <line x1="-150" y1="0" x2="150" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -2s;">
        <circle cx="-150" cy="0" r="10" class="node-mut" />
        <text x="-170" y="5" class="text-label" style="fill: #00FF66;" text-anchor="end">Research</text>
        <text x="-170" y="20" class="text-desc" text-anchor="end">MUTATION: ACTIVE</text>
      </g>
      <g class="dna-strand2" style="animation-delay: -2s;">
        <circle cx="150" cy="0" r="10" class="node-mut" />
      </g>
    </g>

    <g transform="translate(0, 400)">
      <line x1="-100" y1="0" x2="100" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -2.5s;">
        <circle cx="-100" cy="0" r="8" class="node-core" />
      </g>
      <g class="dna-strand2" style="animation-delay: -2.5s;">
        <circle cx="100" cy="0" r="8" class="node-core" />
        <text x="120" y="5" class="text-label" text-anchor="start">IoT</text>
        <text x="120" y="20" class="text-desc" text-anchor="start">GENE: SENSORY</text>
      </g>
    </g>
    
    <g transform="translate(0, 470)">
      <line x1="-50" y1="0" x2="50" y2="0" class="node-link" />
      <g class="dna-strand1" style="animation-delay: -3s;">
        <circle cx="-50" cy="0" r="8" class="node-core" />
        <text x="-70" y="5" class="text-label" text-anchor="end">Full Stack</text>
        <text x="-70" y="20" class="text-desc" text-anchor="end">TRAIT: ADAPTIVE</text>
      </g>
      <g class="dna-strand2" style="animation-delay: -3s;">
        <circle cx="50" cy="0" r="8" class="node-core" />
      </g>
    </g>

    <path d="M -150 50 Q -200 85 -100 120 T -50 190 T -100 260 T -150 330 T -100 400 T -50 470" fill="none" class="node-link" style="opacity: 0.3;" />
    <path d="M 150 50 Q 200 85 100 120 T 50 190 T 100 260 T 150 330 T 100 400 T 50 470" fill="none" class="node-link" style="opacity: 0.3;" />
  </g>
</svg>
