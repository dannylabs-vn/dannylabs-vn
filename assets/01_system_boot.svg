<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes scrollUp { 0% { transform: translateY(20px); opacity: 0; } 10% { transform: translateY(0); opacity: 1; } 90% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-20px); opacity: 0; } }
      @keyframes radarRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      .bg { fill: #050505; }
      .text-sys { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; font-size: 14px; letter-spacing: 1px; }
      .text-alert { fill: #FF2A2A; }
      .text-success { fill: #00FF66; }
      .text-dim { fill: #444; }
      .cursor { fill: #00E5FF; animation: blink 1s step-end infinite; }
      .radar-sweep { transform-origin: 0px 0px; animation: radarRotate 4s linear infinite; }
      .glow { filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4)); }
    </style>
  </defs>

  <rect class="bg" width="800" height="500" />
  
  <g transform="translate(650, 100)" class="glow">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.3" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.3" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.3" />
    <line x1="0" y1="-65" x2="0" y2="65" stroke="#00E5FF" stroke-width="0.5" opacity="0.5" />
    <line x1="-65" y1="0" x2="65" y2="0" stroke="#00E5FF" stroke-width="0.5" opacity="0.5" />
    
    <path class="radar-sweep" d="M 0 0 L 0 -60 A 60 60 0 0 1 42.4 -42.4 Z" fill="rgba(0, 229, 255, 0.2)" />
    
    <circle cx="30" cy="-20" r="3" fill="#00E5FF">
      <animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(50, 50)">
    <text x="0" y="0" class="text-sys glow" style="font-size: 20px;">[ SYSTEM BOOT SEQUENCE INITIATED ]</text>
    
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.1;1" dur="10s" fill="freeze" />
      <text x="0" y="40" class="text-sys">> Kernel loaded. AI Engine v9.0.4 initialized.</text>
    </g>
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="10s" fill="freeze" />
      <text x="0" y="65" class="text-sys">> Engaging neural observation mesh... <tspan class="text-success">[OK]</tspan></text>
    </g>
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.3;1" dur="10s" fill="freeze" />
      <text x="0" y="90" class="text-sys">> Establishing secure connection to host...</text>
    </g>
    
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="10s" fill="freeze" />
      <text x="0" y="130" class="text-sys text-alert glow">! ANOMALY DETECTED IN VISITOR SIGNATURE</text>
    </g>
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.5;1" dur="10s" fill="freeze" />
      <text x="0" y="155" class="text-sys">> Scanning visitor profile... <tspan class="text-dim">Mismatch.</tspan></text>
    </g>
    
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.6;1" dur="10s" fill="freeze" />
      <text x="0" y="200" class="text-sys">> Scanning repository environment...</text>
      <rect x="0" y="210" width="0" height="4" fill="#00E5FF" opacity="0.5">
        <animate attributeName="width" from="0" to="300" dur="1s" begin="6s" fill="freeze" />
      </rect>
    </g>
    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.7;1" dur="10s" fill="freeze" />
      <text x="0" y="240" class="text-sys">> Scanning primary subject (Owner)...</text>
      <rect x="0" y="250" width="0" height="4" fill="#00FF66" opacity="0.5">
        <animate attributeName="width" from="0" to="400" dur="1.5s" begin="7s" fill="freeze" />
      </rect>
    </g>

    <g style="opacity: 0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.8;1" dur="10s" fill="freeze" />
      <text x="0" y="300" class="text-sys" style="font-size: 18px; fill: #fff;">> Subject Lock Acquired.</text>
      <text x="0" y="325" class="text-sys" style="font-size: 18px; fill: #fff;">> Compiling Observation Dossier<tspan class="cursor">_</tspan></text>
    </g>
  </g>

  <path d="M 0 490 L 800 490 L 800 500 L 0 500 Z" fill="#00E5FF" opacity="0.1" />
  <line x1="10" y1="495" x2="50" y2="495" stroke="#00E5FF" stroke-width="2" />
  <line x1="750" y1="495" x2="790" y2="495" stroke="#00E5FF" stroke-width="2" />
</svg>
