<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="60%" stop-color="#1DB954"/>
      <stop offset="60%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="16" y="16" width="308" height="308" rx="12"/>
    </clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    
    .title { font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #1DB954; letter-spacing: 2px; }
    .song-title { font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #ffffff; }
    .song-artist { font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #8B949E; }
    .now-label { font-family: 'Inter', -apple-system, sans-serif; font-size: 10px; font-weight: 500; fill: #1DB954; }
    .time { font-family: 'Inter', -apple-system, sans-serif; font-size: 9px; font-weight: 400; fill: #6a6a6a; }
    .eq-bar { fill: #1DB954; }
    
    @keyframes eq1 { 0%,100% { height: 8px; y: 8px; } 50% { height: 14px; y: 2px; } }
    @keyframes eq2 { 0%,100% { height: 12px; y: 4px; } 50% { height: 6px; y: 10px; } }
    @keyframes eq3 { 0%,100% { height: 6px; y: 10px; } 50% { height: 16px; y: 0px; } }
    @keyframes eq4 { 0%,100% { height: 10px; y: 6px; } 50% { height: 4px; y: 12px; } }
    
    .bar1 { animation: eq1 0.8s ease-in-out infinite; }
    .bar2 { animation: eq2 0.6s ease-in-out infinite; }
    .bar3 { animation: eq3 0.9s ease-in-out infinite; }
    .bar4 { animation: eq4 0.7s ease-in-out infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="480" height="340" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="479" height="339" rx="16" fill="none" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="38" class="title">♫ ON REPEAT</text>
  
  <!-- Spotify icon -->
  <circle cx="453" cy="32" r="10" fill="#1DB954"/>
  <path d="M449.5,35 Q453,33 456.5,35" fill="none" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M450.5,32.5 Q453,31 455.5,32.5" fill="none" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M451.5,30 Q453,29.2 454.5,30" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round"/>

  <!-- Now Playing - Song 1 -->
  <rect x="24" y="56" width="432" height="52" rx="8" fill="#ffffff08" stroke="#ffffff10" stroke-width="0.5"/>
  
  <!-- Equalizer bars -->
  <g transform="translate(36, 72)">
    <rect class="eq-bar bar1" x="0" y="8" width="3" height="8" rx="1"/>
    <rect class="eq-bar bar2" x="5" y="4" width="3" height="12" rx="1"/>
    <rect class="eq-bar bar3" x="10" y="10" width="3" height="6" rx="1"/>
    <rect class="eq-bar bar4" x="15" y="6" width="3" height="10" rx="1"/>
  </g>
  
  <text x="60" y="56" class="now-label" dy="20" class="pulse">NOW PLAYING</text>
  <text x="60" y="56" class="song-title" dy="36">Từ Đầu</text>
  <text x="145" y="56" class="song-artist" dy="36">Chillies</text>
  
  <!-- Progress bar -->
  <rect x="60" y="98" width="384" height="2" rx="1" fill="#4a4a4a"/>
  <rect x="60" y="98" width="230" height="2" rx="1" fill="#1DB954">
    <animate attributeName="width" values="60;384;60" dur="12s" repeatCount="indefinite"/>
  </rect>
  <text x="60" y="98" dy="12" class="time">2:31</text>
  <text x="428" y="98" dy="12" class="time">4:12</text>

  <!-- Song 2 -->
  <rect x="24" y="120" width="432" height="44" rx="8" fill="transparent"/>
  <text x="42" y="120" class="song-artist" dy="18" fill="#6a6a6a">2</text>
  <text x="60" y="120" class="song-title" dy="18">The Winner Takes It All</text>
  <text x="60" y="120" class="song-artist" dy="34">ABBA</text>

  <!-- Song 3 -->
  <rect x="24" y="172" width="432" height="44" rx="8" fill="transparent"/>
  <text x="42" y="172" class="song-artist" dy="18" fill="#6a6a6a">3</text>
  <text x="60" y="172" class="song-title" dy="18">DtMF</text>
  <text x="60" y="172" class="song-artist" dy="34">Bad Bunny</text>

  <!-- Song 4 -->
  <rect x="24" y="224" width="432" height="44" rx="8" fill="transparent"/>
  <text x="42" y="224" class="song-artist" dy="18" fill="#6a6a6a">4</text>
  <text x="60" y="224" class="song-title" dy="18">Promise</text>
  <text x="60" y="224" class="song-artist" dy="34">Laufey</text>

  <!-- Song 5 -->
  <rect x="24" y="276" width="432" height="44" rx="8" fill="transparent"/>
  <text x="42" y="276" class="song-artist" dy="18" fill="#6a6a6a">5</text>
  <text x="60" y="276" class="song-title" dy="18">Tập Đi</text>
  <text x="60" y="276" class="song-artist" dy="34">Truant Fu</text>

</svg>
