<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #1DB954; letter-spacing: 2px; }
    .song-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #ffffff; }
    .song-artist { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #8B949E; }
    .now-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 500; fill: #1DB954; }
    .time { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; font-weight: 400; fill: #6a6a6a; }
    .num { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #6a6a6a; }
    .eq-bar { fill: #1DB954; }
  </style>

  <!-- Background -->
  <rect width="480" height="340" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="479" height="339" rx="16" fill="none" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="38" class="title">ON REPEAT</text>
  
  <!-- Spotify icon -->
  <circle cx="453" cy="32" r="10" fill="#1DB954"/>
  <path d="M449.5,35 Q453,33 456.5,35" fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M450.5,32.5 Q453,31 455.5,32.5" fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M451.5,30 Q453,29.2 454.5,30" fill="none" stroke="#1a1a2e" stroke-width="1" stroke-linecap="round"/>

  <!-- Now Playing - Song 1 -->
  <rect x="24" y="56" width="432" height="52" rx="8" fill="#ffffff08" stroke="#ffffff10" stroke-width="0.5"/>
  
  <!-- Equalizer bars (static for GitHub compatibility) -->
  <g transform="translate(36, 72)">
    <rect class="eq-bar" x="0" y="6" width="3" height="10" rx="1"/>
    <rect class="eq-bar" x="5" y="2" width="3" height="14" rx="1"/>
    <rect class="eq-bar" x="10" y="8" width="3" height="8" rx="1"/>
    <rect class="eq-bar" x="15" y="4" width="3" height="12" rx="1"/>
  </g>
  
  <text x="60" y="76" class="now-label">NOW PLAYING</text>
  <text x="60" y="94" class="song-title">Tu Dau</text>
  <text x="120" y="94" class="song-artist">Chillies</text>
  
  <!-- Progress bar -->
  <rect x="60" y="100" width="384" height="2" rx="1" fill="#4a4a4a"/>
  <rect x="60" y="100" width="230" height="2" rx="1" fill="#1DB954"/>
  <text x="60" y="112" class="time">2:31</text>
  <text x="428" y="112" class="time">4:12</text>

  <!-- Divider -->
  <line x1="40" y1="122" x2="440" y2="122" stroke="#ffffff08" stroke-width="0.5"/>

  <!-- Song 2 -->
  <text x="42" y="148" class="num">2</text>
  <text x="60" y="148" class="song-title">The Winner Takes It All</text>
  <text x="60" y="164" class="song-artist">ABBA</text>

  <!-- Divider -->
  <line x1="40" y1="178" x2="440" y2="178" stroke="#ffffff08" stroke-width="0.5"/>

  <!-- Song 3 -->
  <text x="42" y="204" class="num">3</text>
  <text x="60" y="204" class="song-title">DtMF</text>
  <text x="60" y="220" class="song-artist">Bad Bunny</text>

  <!-- Divider -->
  <line x1="40" y1="234" x2="440" y2="234" stroke="#ffffff08" stroke-width="0.5"/>

  <!-- Song 4 -->
  <text x="42" y="260" class="num">4</text>
  <text x="60" y="260" class="song-title">Promise</text>
  <text x="60" y="276" class="song-artist">Laufey</text>

  <!-- Divider -->
  <line x1="40" y1="290" x2="440" y2="290" stroke="#ffffff08" stroke-width="0.5"/>

  <!-- Song 5 -->
  <text x="42" y="316" class="num">5</text>
  <text x="60" y="316" class="song-title">Tap Di</text>
  <text x="60" y="332" class="song-artist">Truant Fu</text>

</svg>
