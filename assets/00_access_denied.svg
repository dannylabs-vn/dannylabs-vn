<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes scanline { 0% { transform: translateY(-100px); } 100% { transform: translateY(500px); } }
      @keyframes glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 1px); } 40% { transform: translate(2px, -1px); } 60% { transform: translate(-1px, 2px); } 80% { transform: translate(1px, -2px); } }
      @keyframes progress { 0% { width: 0%; } 10% { width: 10%; } 20% { width: 10%; } 50% { width: 40%; } 60% { width: 60%; } 80% { width: 65%; } 90% { width: 90%; } 100% { width: 100%; } }
      
      .bg { fill: #050505; }
      .text { font-family: 'Share Tech Mono', monospace; fill: #ff2a2a; font-size: 24px; letter-spacing: 4px; }
      .text-small { font-family: 'Share Tech Mono', monospace; fill: #888; font-size: 14px; letter-spacing: 2px; }
      .cursor { fill: #ff2a2a; animation: blink 1s step-end infinite; }
      .scan { fill: rgba(255, 42, 42, 0.05); animation: scanline 4s linear infinite; pointer-events: none; }
      .glitch-text { animation: glitch 3s infinite; }
      .progress-bg { fill: #111; }
      .progress-bar { fill: #ff2a2a; animation: progress 10s ease-out forwards; }
      .red-glow { filter: drop-shadow(0 0 10px rgba(255,42,42,0.5)); }
    </style>
  </defs>

  <rect class="bg" width="800" height="400" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111" stroke-width="0.5" />
  </pattern>
  <rect width="800" height="400" fill="url(#grid)" />

  <rect class="scan" width="800" height="50" />
  
  <g transform="translate(250, 150)">
    <text x="150" y="0" class="text glitch-text red-glow" text-anchor="middle" style="font-size: 32px; font-weight: bold;">[ ACCESS DENIED ]</text>
    
    <text x="150" y="40" class="text-small" text-anchor="middle" style="fill: #ff2a2a;">WARNING: UNKNOWN VISITOR DETECTED</text>
    
    <g transform="translate(50, 80)">
      <text x="0" y="0" class="text-small" style="fill: #aaa;">> Authenticating</text>
      <text x="135" y="0" class="text-small" style="fill: #aaa;">
        <tspan opacity="0"><animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.25;0.75;1" dur="2s" repeatCount="indefinite"/></tspan>
        <tspan opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.75;1" dur="2s" repeatCount="indefinite"/>.</tspan>
        <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.75;0.9;1" dur="2s" repeatCount="indefinite"/>.</tspan>
        <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.9;0.95;1" dur="2s" repeatCount="indefinite"/>.</tspan>
      </text>
      <rect x="160" y="-12" width="8" height="15" class="cursor" />
    </g>

    <rect x="-50" y="120" width="400" height="10" class="progress-bg" rx="2" />
    <rect x="-50" y="120" width="400" height="10" class="progress-bar red-glow" rx="2" />
    
    <text x="-150" y="-80" class="text-small" style="fill: #222; font-size: 10px;">01000001 01000011 01000011 01000101 01010011 01010011</text>
    <text x="250" y="200" class="text-small" style="fill: #222; font-size: 10px;">01000100 01000101 01001110 01001001 01000101 01000100</text>
  </g>
  
  <path d="M 20 50 L 20 20 L 50 20" fill="none" stroke="#ff2a2a" stroke-width="2" style="opacity: 0.5" />
  <path d="M 780 50 L 780 20 L 750 20" fill="none" stroke="#ff2a2a" stroke-width="2" style="opacity: 0.5" />
  <path d="M 20 350 L 20 380 L 50 380" fill="none" stroke="#ff2a2a" stroke-width="2" style="opacity: 0.5" />
  <path d="M 780 350 L 780 380 L 750 380" fill="none" stroke="#ff2a2a" stroke-width="2" style="opacity: 0.5" />
</svg>
