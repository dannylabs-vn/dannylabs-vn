<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @keyframes float1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
      @keyframes float2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes float3 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
      @keyframes unlock { 0% { stroke-dasharray: 0 2000; } 100% { stroke-dasharray: 2000 0; } }
      
      .bg { fill: #050505; }
      .text-main { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; }
      .text-title { font-family: 'Share Tech Mono', monospace; fill: #00E5FF; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
      .text-desc { font-family: 'Share Tech Mono', monospace; fill: #aaa; font-size: 14px; }
      .glow { filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.6)); }
      .capsule-bg { fill: rgba(0, 229, 255, 0.05); stroke: #00E5FF; stroke-width: 1; }
      .capsule-line { stroke: #00E5FF; stroke-width: 2; opacity: 0.5; }
    </style>
  </defs>

  <rect class="bg" width="800" height="600" />
  
  <text x="400" y="80" class="text-title glow" text-anchor="middle">[ MEMORY VAULT ACCESS GRANTED ]</text>
  <text x="400" y="110" class="text-desc" text-anchor="middle">Retrieving Core Memory Capsules...</text>

  <g transform="translate(100, 200)" style="animation: float1 4s ease-in-out infinite;">
    <rect x="0" y="0" width="180" height="250" rx="90" class="capsule-bg glow" style="animation: unlock 2s forwards;" />
    <circle cx="90" cy="50" r="30" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="4" />
    <text x="90" y="55" class="text-main" text-anchor="middle" font-size="12">001</text>
    
    <text x="90" y="120" class="text-main" text-anchor="middle" font-size="16" font-weight="bold">SmartBites</text>
    <rect x="20" y="140" width="140" height="1" fill="#00E5FF" opacity="0.3"/>
    
    <text x="90" y="160" class="text-desc" text-anchor="middle" font-size="12">PURPOSE</text>
    <foreignObject x="20" y="170" width="140" height="60">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Share Tech Mono', monospace; color: #aaa; font-size: 12px; text-align: center; line-height: 1.4;">Teach machines how humans eat.</div>
    </foreignObject>
  </g>

  <g transform="translate(310, 250)" style="animation: float2 5s ease-in-out infinite;">
    <rect x="0" y="0" width="180" height="250" rx="90" class="capsule-bg glow" style="animation: unlock 2.5s forwards;" />
    <circle cx="90" cy="50" r="30" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="4" />
    <text x="90" y="55" class="text-main" text-anchor="middle" font-size="12">002</text>
    
    <text x="90" y="120" class="text-main" text-anchor="middle" font-size="16" font-weight="bold">VSignChat</text>
    <rect x="20" y="140" width="140" height="1" fill="#00E5FF" opacity="0.3"/>
    
    <text x="90" y="160" class="text-desc" text-anchor="middle" font-size="12">PURPOSE</text>
    <foreignObject x="10" y="170" width="160" height="70">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Share Tech Mono', monospace; color: #aaa; font-size: 12px; text-align: center; line-height: 1.4;">Teach machines how humans communicate without sound.</div>
    </foreignObject>
  </g>

  <g transform="translate(520, 180)" style="animation: float3 4.5s ease-in-out infinite;">
    <rect x="0" y="0" width="180" height="250" rx="90" class="capsule-bg glow" style="animation: unlock 3s forwards;" />
    <circle cx="90" cy="50" r="30" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="4" />
    <text x="90" y="55" class="text-main" text-anchor="middle" font-size="12">003</text>
    
    <text x="90" y="120" class="text-main" text-anchor="middle" font-size="16" font-weight="bold">Research</text>
    <rect x="20" y="140" width="140" height="1" fill="#00E5FF" opacity="0.3"/>
    
    <text x="90" y="160" class="text-desc" text-anchor="middle" font-size="12">PURPOSE</text>
    <foreignObject x="20" y="170" width="140" height="60">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Share Tech Mono', monospace; color: #aaa; font-size: 12px; text-align: center; line-height: 1.4;">Teach humans through machines.</div>
    </foreignObject>
  </g>
  
  <path d="M 190 200 Q 250 150 400 130" fill="none" class="capsule-line" stroke-dasharray="5 5" />
  <path d="M 400 250 Q 400 190 400 130" fill="none" class="capsule-line" stroke-dasharray="5 5" />
  <path d="M 610 180 Q 550 130 400 130" fill="none" class="capsule-line" stroke-dasharray="5 5" />
</svg>
